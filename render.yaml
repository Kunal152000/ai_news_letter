# One Web Service: /chat + /mcp/sse on the same URL.
# Start command can be either:
#   python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
#   python mcp_app.py
# On Render, mcp_app.py automatically runs app.main:app unless MCP_ONLY=1 (MCP-only second service).

services:
  - type: web
    name: ai-newsletter
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
