# One Web Service: /chat + /mcp/sse on the same URL.
# Start command (do NOT use mcp_app:mcp_asgi_app — that skips /chat):
#   python -m uvicorn mcp_app:app --host 0.0.0.0 --port $PORT
#   python mcp_app.py
# On Render, `mcp_app:app` is app.main:app unless MCP_ONLY=1.

services:
  - type: web
    name: ai-newsletter
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn mcp_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
