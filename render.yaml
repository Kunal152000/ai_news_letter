# One Web Service: /chat + /mcp/sse on the same URL (see app.main:app).
# Render sets RENDER_EXTERNAL_URL; the app uses it so the agent calls the correct /mcp/sse automatically.
# Optional: second service with `python mcp_app.py` only if you want MCP on a different hostname (then set MCP_SSE_URL on the API service).

services:
  - type: web
    name: ai-newsletter
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
