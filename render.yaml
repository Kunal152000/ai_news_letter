# Single Web Service: /chat + /mcp/sse (app.main:app). RENDER_EXTERNAL_URL drives MCP_SSE_URL when unset.

services:
  - type: web
    name: ai-newsletter
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
