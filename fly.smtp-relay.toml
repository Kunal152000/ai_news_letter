# Deploy from repo root:
#   fly apps create <your-mail-app-name>
#   fly secrets set ...   (see fly_email/README.md)
#   fly deploy -c fly.smtp-relay.toml
#
# After first launch, set `app = "your-app-name"` below (or run `fly config save`).

app = "ai-newsletter-smtp-relay"

[build]
  dockerfile = "fly_email/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
